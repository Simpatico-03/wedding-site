<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP | Richa & Karun</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <a href="index.html">Home</a>
        <a href="index.html#events">Events</a>
        <a href="index.html#dress-code">Dress Code</a>
        <a href="rsvp.html">RSVP</a>
        <a href="index.html#travel">Travel</a>
        <a href="index.html#wedding-party">Wedding Party</a>
        <a href="index.html#faq">FAQ</a>
    </div>
</nav>

<main class="container rsvp-page">
    <p class="verse">20th - 21st August 2026</p>
    <h1 class="names">RSVP</h1>
    <p class="invite-text">We would love to know if you can celebrate with us.</p>

    <div class="divider"></div>

    <section id="rsvp-form" class="rsvp-form">
        <h2>RSVP Form</h2>
        <form data-rsvp-form>
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" autocomplete="tel">
            </div>
            <div class="form-group">
                <label for="attendance">Will You Attend?</label>
                <select id="attendance" name="attendance" required>
                    <option value="">Select...</option>
                    <option value="Yes, I will attend">Yes, I will attend</option>
                    <option value="No, I cannot attend">No, I cannot attend</option>
                </select>
            </div>
            <div class="form-group">
                <label for="guests">Number of Guests</label>
                <select id="guests" name="guests" required>
                    <option value="">Select...</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5+">5+</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dietary">Dietary Restrictions</label>
                <input type="text" id="dietary" name="dietary" placeholder="e.g., Vegetarian, Vegan">
            </div>
            <div class="form-group">
                <label for="message">Message for the Couple</label>
                <textarea id="message" name="message" rows="3" placeholder="Share your warm wishes..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit RSVP</button>
            <p class="form-status" data-form-status role="status" aria-live="polite"></p>
        </form>
    </section>
</main>

<script src="rsvp.js"></script>
</body>
</html>
