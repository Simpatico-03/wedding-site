<main class="container rsvp-page">
    <p class="verse">20 August 2026</p>
    <h1 class="names">RSVP</h1>
    <p class="invite-text">We would love to know if you can celebrate with us.</p>

    <div class="ornament">
        <div class="ornament-line"></div>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M9 1 C5 1 1 5 1 9 C1 13 5 17 9 17 C13 17 17 13 17 9 C17 5 13 1 9 1Z" stroke="#C4973A" stroke-width="1" fill="none"/>
            <path d="M9 5 L9 13 M5 9 L13 9" stroke="#C4973A" stroke-width="1"/>
        </svg>
        <div class="ornament-line"></div>
    </div>

    <section id="rsvp-form" class="rsvp-form">
        <h2 class="section-title reveal" style="--i: 0;">RSVP Form</h2>
        <form data-rsvp-form>
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" autocomplete="tel">
            </div>
            <div class="form-group">
                <label for="attendance">Will You Attend?</label>
                <select id="attendance" name="attendance" required>
                    <option value="">Select...</option>
                    <option value="Yes, I will attend">Yes, I will attend</option>
                    <option value="No, I cannot attend">No, I cannot attend</option>
                </select>
            </div>
            <div class="form-group">
                <label for="guests">Number of Guests</label>
                <select id="guests" name="guests" required>
                    <option value="">Select...</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5+">5+</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dietary">Dietary Restrictions</label>
                <input type="text" id="dietary" name="dietary" placeholder="e.g., Vegetarian, Vegan">
            </div>
            <div class="form-group">
                <label for="message">Message for the Couple</label>
                <textarea id="message" name="message" rows="3" placeholder="Share a message with Richa & Karun..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit RSVP</button>
            <p class="form-status" data-form-status role="status" aria-live="polite"></p>
        </form>
    </section>
</main>
